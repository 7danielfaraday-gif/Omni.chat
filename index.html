<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omni.chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000; --surface: #0a0a0a; --border: #1a1a1a; --border-bright: #2e2e2e;
    --accent: #e8ff00; --text: #d4d4d4; --text-dim: #555; --danger: #ff2d2d;
    --font-mono: 'Share Tech Mono', monospace; --font-display: 'Bebas Neue', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px);
  }

  /* LOGIN */
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; animation: fadeIn 0.6s ease; }
  .login-logo { font-family: var(--font-display); font-size: clamp(4rem, 12vw, 9rem); letter-spacing: 0.08em; color: #fff; line-height: 1; }
  .login-logo span { color: var(--accent); text-shadow: 0 0 20px rgba(232,255,0,0.6); }
  .login-sub { font-size: 0.65rem; letter-spacing: 0.35em; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; margin-bottom: 52px; }
  .login-box { width: min(380px, 90vw); border: 1px solid var(--border-bright); background: var(--surface); padding: 32px 28px; position: relative; }
  .login-box::before { content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 2px; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .login-label { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; display: block; }
  .login-input { width: 100%; background: #000; border: 1px solid var(--border-bright); color: var(--accent); font-family: var(--font-mono); font-size: 1.1rem; padding: 12px 14px; outline: none; caret-color: var(--accent); transition: border-color 0.2s, box-shadow 0.2s; }
  .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .login-input::placeholder { color: #333; }
  .login-btn { width: 100%; margin-top: 16px; background: var(--accent); color: #000; border: none; font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 0.15em; padding: 14px; cursor: pointer; transition: background 0.15s; }
  .login-btn:hover { background: #fff; }
  .login-error { margin-top: 10px; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--danger); min-height: 1em; text-align: center; }

  /* CHAT */
  #chat-screen { display: none; flex-direction: column; height: 100vh; }
  .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .header-title { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 0.15em; color: #fff; }
  .header-title span { color: var(--accent); }
  .header-meta { display: flex; align-items: center; gap: 18px; font-size: 0.62rem; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
  .user-badge { background: #111; border: 1px solid var(--border-bright); padding: 4px 10px; font-size: 0.62rem; letter-spacing: 0.15em; color: var(--accent); }

  #messages { flex: 1; overflow-y: auto; padding: 20px 20px 10px; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: #000; }
  #messages::-webkit-scrollbar-thumb { background: #222; }

  .msg { display: flex; flex-direction: column; gap: 2px; padding: 10px 14px; border-left: 2px solid transparent; transition: background 0.15s; animation: slideIn 0.2s ease; }
  .msg:hover { background: rgba(255,255,255,0.02); border-left-color: var(--border-bright); }
  .msg.own { border-left-color: var(--accent); background: rgba(232,255,0,0.02); }
  .msg-header { display: flex; align-items: baseline; gap: 10px; }
  .msg-user { font-family: var(--font-display); font-size: 0.85rem; letter-spacing: 0.12em; color: #888; }
  .msg.own .msg-user { color: var(--accent); }
  .msg-time { font-size: 0.58rem; color: var(--text-dim); }
  .msg-text { font-size: 0.9rem; color: var(--text); line-height: 1.5; word-break: break-word; }
  .msg-hash { font-size: 0.52rem; color: #252525; margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .msg-hash::before { content: 'SHA256'; font-size: 0.48rem; letter-spacing: 0.2em; color: #1e1e1e; border: 1px solid #1e1e1e; padding: 1px 4px; }

  .chat-footer { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .input-row { display: flex; gap: 10px; align-items: center; }
  .prompt-symbol { color: var(--accent); font-size: 1rem; flex-shrink: 0; text-shadow: 0 0 10px var(--accent); }
  #msg-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border-bright); color: var(--text); font-family: var(--font-mono); font-size: 0.9rem; padding: 6px 0; outline: none; caret-color: var(--accent); transition: border-color 0.2s; }
  #msg-input:focus { border-bottom-color: var(--accent); }
  #msg-input::placeholder { color: #2a2a2a; }
  #msg-input:disabled { opacity: 0.4; }
  .send-btn { background: transparent; border: 1px solid var(--border-bright); color: var(--accent); font-family: var(--font-display); font-size: 0.9rem; letter-spacing: 0.15em; padding: 8px 20px; cursor: pointer; transition: background 0.15s; }
  .send-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .footer-meta { margin-top: 8px; font-size: 0.55rem; color: #222; letter-spacing: 0.2em; text-transform: uppercase; display: flex; justify-content: space-between; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">OMNI<span>.</span>CHAT</div>
  <div class="login-sub">anonymous · ephemeral · encrypted</div>
  <div class="login-box">
    <label class="login-label" for="username-input">identificador anônimo</label>
    <input id="username-input" class="login-input" type="text" placeholder="ex: shadow_99" maxlength="24" autocomplete="off" spellcheck="false" />
    <button class="login-btn" onclick="enterChat()">ENTRAR NO OMNI</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="chat-screen">
  <header class="chat-header">
    <div class="header-title">OMNI<span>.</span>CHAT</div>
    <div class="header-meta">
      <span><span class="status-dot"></span>&nbsp; ONLINE</span>
      <span id="online-count">—</span>
      <span class="user-badge" id="current-user-badge"></span>
    </div>
  </header>
  <div id="messages"></div>
  <footer class="chat-footer">
    <div class="input-row">
      <span class="prompt-symbol">&#x25B6;</span>
      <input id="msg-input" type="text" placeholder="mensagem..." maxlength="500" autocomplete="off" spellcheck="false" />
      <button class="send-btn" id="send-btn" onclick="sendMessage()">SEND</button>
    </div>
    <div class="footer-meta">
      <span>mensagens expiram em 1h · sha-256 signed</span>
      <span id="char-count">0/500</span>
    </div>
  </footer>
</div>

<script>
let currentUser = '';
const rendered = new Set();

async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2,'0')).join('');
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function enterChat() {
  const input = document.getElementById('username-input');
  const err = document.getElementById('login-error');
  const name = input.value.trim();
  if (!name || name.length < 2) { err.textContent = '⚠ mínimo 2 caracteres'; return; }
  if (!/^[a-zA-Z0-9_\-\.]+$/.test(name)) { err.textContent = '⚠ use apenas letras, números, _ - .'; return; }

  currentUser = name;
  sessionStorage.setItem('omni_user', name);
  document.getElementById('current-user-badge').textContent = name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';

  loadMessages();
  setInterval(loadMessages, 2500);

  const msgInput = document.getElementById('msg-input');
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });
  msgInput.addEventListener('input', () => { document.getElementById('char-count').textContent = msgInput.value.length + '/500'; });
  msgInput.focus();
}

async function loadMessages() {
  try {
    const res = await fetch('/api/messages');
    if (!res.ok) return;
    const data = await res.json();
    renderMessages(data.messages || []);
    const count = data.onlineCount || 1;
    document.getElementById('online-count').textContent = count + ' ONLINE';
  } catch (e) {}
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  const wasAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 80;
  let added = false;

  messages.forEach(msg => {
    if (rendered.has(msg.id)) return;
    rendered.add(msg.id);
    added = true;

    const div = document.createElement('div');
    div.className = 'msg ' + (msg.user === currentUser ? 'own' : 'other');
    div.dataset.id = msg.id;

    const time = new Date(msg.ts).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    div.innerHTML = `
      <div class="msg-header">
        <span class="msg-user">${esc(msg.user)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-text">${esc(msg.text)}</div>
      <div class="msg-hash">${msg.hash}</div>
    `;
    container.appendChild(div);
  });

  if (added && wasAtBottom) container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text || !currentUser) return;

  // desabilita enquanto envia
  input.disabled = true;
  btn.disabled = true;
  input.value = '';
  document.getElementById('char-count').textContent = '0/500';

  try {
    const hash = await sha256(currentUser + ':' + text);
    const res = await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: currentUser, text, hash })
    });

    if (res.ok) {
      const data = await res.json();
      // renderiza imediatamente com a resposta do servidor
      if (data.msg) renderMessages([data.msg]);
    }
  } catch (e) {}

  input.disabled = false;
  btn.disabled = false;
  input.focus();
}

// login via Enter
document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') enterChat(); });
</script>
</body>
</html>
